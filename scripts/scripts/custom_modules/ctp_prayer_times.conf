# vim:set ft=tmux:
%hidden MODULE_NAME='ctp_prayer_times'

set-option -gq "@catppuccin_${MODULE_NAME}_icon" '🕌'
set-option -gq "@catppuccin_${MODULE_NAME}_color" '#{l:#{prayer_times_color}}'
set-option -gq "@catppuccin_${MODULE_NAME}_text" '#{l:#{prayer_times}}'
set-option -gq "@catppuccin_status_${MODULE_NAME}_icon_bg" '#{l:#{prayer_times_color}}'

source-file -F '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/utils/status_module.conf'
